version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cafe_postgres
    restart: always
    environment:
      POSTGRES_USER: cafe
      POSTGRES_PASSWORD: cafe
      POSTGRES_DB: cafe
    ports:
      - "5432:5432"
    volumes:
      - cafe_db_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: cafe_backend_prod
    restart: always
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_USER=cafe
      - POSTGRES_PASSWORD=cafe
      - POSTGRES_DB=cafe
      - SECRET_KEY=super_secret_cryptographic_key_for_jwt_auth_1234567890
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=480
      - SECURE_COOKIE=False
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: cafe_frontend_prod
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  cafe_db_data:
