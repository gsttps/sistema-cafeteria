name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint & tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Lint with ruff
        run: ruff check backend/

      # Descomentar después de correr `ruff format backend/` una vez y committear:
      # - name: Check formatting with ruff
      #   run: ruff format --check backend/

      - name: Run tests
        env:
          SECRET_KEY: ci_secret_key_not_used_in_production_replace_me_1234
          ADMIN_INITIAL_PASSWORD: ci_admin_password
          SECURE_COOKIE: "false"
        run: pytest backend/tests/ -v --tb=short

  frontend:
    name: Frontend — lint, type-check & build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint with ESLint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build
